<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala VNS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;
    --vns1:#00e5a0;--vns1b:rgba(0,229,160,0.35);
    --vns2:#a78bfa;--vns2b:rgba(167,139,250,0.35);
    --blue:#0ea5e9;--warn:#f59e0b;--danger:#ef4444;--orange:#fb923c;
    --text:#e2e8f0;--muted:#64748b;--r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding:0 0 80px;}
  header{background:linear-gradient(135deg,#0d1b2e,#0a0f1e);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .ht{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--vns1),var(--vns2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .logo h1{font-size:18px;font-weight:700;letter-spacing:-.5px;color:#fff;}
  .logo p{font-size:11px;color:var(--muted);font-weight:300;margin-top:-2px;}
  .date-b{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--vns1);text-align:right;}
  .date-b .dn{color:var(--muted);font-size:10px;display:block;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;transition:background .3s;}
  .sync-dot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);}
  .sync-row{display:flex;align-items:center;padding:8px 20px 0;font-size:10px;color:var(--muted);}
  .legend{display:flex;gap:14px;padding:10px 20px 0;align-items:center;flex-wrap:wrap;}
  .li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;}
  .ld{width:9px;height:9px;border-radius:3px;}
  .ld1{background:var(--vns1);}.ld2{background:var(--vns2);}
  .li.l1{color:var(--vns1);}.li.l2{color:var(--vns2);}
  .edit-hint{margin-left:auto;font-size:9px;color:var(--muted);}
  .stats{display:flex;gap:8px;padding:10px 20px 0;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center;}
  .sn{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
  .sl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
  .st .sn{color:var(--blue);}.sv1 .sn{color:var(--vns1);}.sv2 .sn{color:var(--vns2);}
  .add-btns{display:flex;gap:10px;margin:14px 20px 0;}
  .add-btn{flex:1;border:none;border-radius:var(--r);padding:13px 10px;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
  .add-btn:active{transform:scale(.97);}
  .add-btn.v1{background:linear-gradient(135deg,var(--vns1),#00c489);color:#0a0f1e;}
  .add-btn.v2{background:linear-gradient(135deg,var(--vns2),#7c3aed);color:#fff;}
  .tw{padding:14px 20px 0;}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:6px;}
  .sh+.sh{margin-top:24px;}
  .sl-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;border-radius:20px;white-space:nowrap;}
  .sl1{color:var(--vns1);background:rgba(0,229,160,.1);border:1px solid var(--vns1b);}
  .sl2{color:var(--vns2);background:rgba(167,139,250,.1);border:1px solid var(--vns2b);}
  .sbar{height:2px;border-radius:2px;flex:1;}
  .sb1{background:linear-gradient(90deg,var(--vns1),transparent);}
  .sb2{background:linear-gradient(90deg,var(--vns2),transparent);}
  .card{border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:all .25s;background:var(--surface);position:relative;}
  .card.c1{border:1px solid var(--vns1b);border-left:4px solid var(--vns1);}
  .card.c2{border:1px solid var(--vns2b);border-left:4px solid var(--vns2);}
  .card.c1.scon{background:linear-gradient(135deg,rgba(0,229,160,.05),var(--surface));}
  .card.c2.scon{background:linear-gradient(135deg,rgba(167,139,250,.05),var(--surface));}
  .card.spro{border-left-color:var(--blue)!important;background:linear-gradient(135deg,rgba(14,165,233,.05),var(--surface))!important;}
  .card.sfin{opacity:.5;}
  .card.ssus{opacity:.4;border-left-color:var(--orange)!important;background:linear-gradient(135deg,rgba(251,146,60,.05),var(--surface))!important;}
  .ch{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;border-bottom:1px solid var(--border);}
  .tb{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;}
  .c1 .tb{color:var(--vns1);}.c2 .tb{color:var(--vns2);}
  .spro .tb{color:var(--blue)!important;}.ssus .tb{color:var(--orange)!important;}
  .sbg{display:flex;gap:4px;}
  .sbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .sbtn:active{transform:scale(.85);}
  .sbtn.acon{background:rgba(0,229,160,.15);border-color:var(--vns1);box-shadow:0 0 8px rgba(0,229,160,.3);}
  .c2 .sbtn.acon{background:rgba(167,139,250,.15);border-color:var(--vns2);box-shadow:0 0 8px rgba(167,139,250,.3);}
  .sbtn.apro{background:rgba(14,165,233,.15);border-color:var(--blue);box-shadow:0 0 8px rgba(14,165,233,.3);}
  .sbtn.afin{background:rgba(100,116,139,.15);border-color:var(--muted);}
  .sbtn.asus{background:rgba(251,146,60,.15);border-color:var(--orange);box-shadow:0 0 8px rgba(251,146,60,.3);}
  .cb{padding:10px 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ir{display:flex;flex-direction:column;}
  .il{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;}
  .iv{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ir.snr{grid-column:1/-1;}
  .ir.snr .iv{font-size:14px;white-space:normal;}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:6px;}
  .pp{background:rgba(245,158,11,.12);color:var(--warn);}
  .pc1{background:rgba(0,229,160,.1);color:var(--vns1);}
  .pc2{background:rgba(167,139,250,.1);color:var(--vns2);}
  .ppr{background:rgba(14,165,233,.12);color:var(--blue);}
  .pfi{background:rgba(100,116,139,.12);color:var(--muted);}
  .psu{background:rgba(251,146,60,.12);color:var(--orange);}
  .wbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:8px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);border-radius:10px;padding:9px 14px;color:#25d366;font-size:12px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;text-decoration:none;}
  .edit-row{grid-column:1/-1;display:flex;gap:8px;margin-top:4px;}
  .ecb{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-radius:10px;font-size:11px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;border:none;transition:all .2s;}
  .ecb.eb{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warn);}
  .ecb.db{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--danger);}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .ei{font-size:44px;margin-bottom:10px;}
  .empty p{font-size:14px;line-height:1.7;}
  .loading{text-align:center;padding:60px 20px;color:var(--muted);}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--vns1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
  .ov.open{display:flex;}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:600px;animation:su .28s ease;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;}
  @keyframes su{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .mh{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .mhd{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .md{width:12px;height:12px;border-radius:4px;}
  .md.v1{background:var(--vns1);}.md.v2{background:var(--vns2);}.md.ed{background:var(--warn);}
  .modal h2{font-size:18px;font-weight:700;color:#fff;}
  .edit-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--warn);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:20px;margin-bottom:16px;display:inline-block;}
  .ff{margin-bottom:13px;}
  .ff label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;}
  .ff input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
  .ff input:focus{border-color:var(--blue);}
  .ff input[type="time"]{font-family:'DM Mono',monospace;}
  .mbtns{display:flex;gap:10px;margin-top:20px;}
  .bcn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:14px;font-size:15px;font-family:'Sora',sans-serif;cursor:pointer;font-weight:600;}
  .bsv{flex:2;border:none;border-radius:12px;padding:14px;font-size:15px;font-family:'Sora',sans-serif;cursor:pointer;font-weight:700;}
  .bsv.v1{background:linear-gradient(135deg,var(--vns1),#00c489);color:#0a0f1e;}
  .bsv.v2{background:linear-gradient(135deg,var(--vns2),#7c3aed);color:#fff;}
  .bsv.ed{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0f1e;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;z-index:300;transition:transform .3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="ht">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <div><h1>Escala VNS</h1><p>Centro Cirúrgico</p></div>
    </div>
    <div class="date-b"><span class="dn" id="dayName"></span><span id="dateStr"></span></div>
  </div>
</header>
<div class="sync-row"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">Conectando...</span></div>
<div class="legend">
  <div class="li l1"><span class="ld ld1"></span> VNS 1</div>
  <div class="li l2"><span class="ld ld2"></span> VNS 2</div>
  <span class="edit-hint">✏️ Toque em Editar no card</span>
</div>
<div class="stats">
  <div class="stat st"><div class="sn" id="sT">0</div><div class="sl">Total</div></div>
  <div class="stat sv1"><div class="sn" id="sV1">0</div><div class="sl">VNS 1</div></div>
  <div class="stat sv2"><div class="sn" id="sV2">0</div><div class="sl">VNS 2</div></div>
</div>
<div class="add-btns">
  <button class="add-btn v1" onclick="openModal('vns1',null)">＋ VNS 1</button>
  <button class="add-btn v2" onclick="openModal('vns2',null)">＋ VNS 2</button>
</div>
<div class="tw" id="mainList">
  <div class="loading"><div class="spinner"></div><p>Carregando escala...</p></div>
</div>
<div class="ov" id="sOv">
  <div class="modal">
    <div class="mh"></div>
    <div id="editLblWrap"></div>
    <div class="mhd"><div class="md v1" id="mDot"></div><h2 id="mTitle">Nova Cirurgia</h2></div>
    <div class="ff"><label>Horário</label><input type="time" id="fT"/></div>
    <div class="ff"><label>Nome da Cirurgia</label><input type="text" id="fN" placeholder="Ex: Apendicectomia"/></div>
    <div class="ff"><label>Cirurgião</label><input type="text" id="fS" placeholder="Dr(a). Nome"/></div>
    <div class="ff"><label>Anestesista</label><input type="text" id="fA" placeholder="Dr(a). Nome"/></div>
    <div class="ff"><label>WhatsApp do Anestesista</label><input type="tel" id="fP" placeholder="(11) 99999-9999"/></div>
    <div class="mbtns">
      <button class="bcn" onclick="closeMod()">Cancelar</button>
      <button class="bsv v1" id="bSav" onclick="saveSurg()">Salvar ✓</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDYkrbxndcEgH9uz0dNbkUF8gtNoAMe7OY",
    authDomain: "escala-vns.firebaseapp.com",
    projectId: "escala-vns",
    storageBucket: "escala-vns.firebasestorage.app",
    messagingSenderId: "913644431265",
    appId: "1:913644431265:web:8a492e0d9ad3ee190c0de0"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const today = new Date().toISOString().split('T')[0];
  const col = collection(db, 'cirurgias');
  const q = query(col, where('date', '==', today));
  const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const now = new Date();
  document.getElementById('dayName').textContent = days[now.getDay()];
  document.getElementById('dateStr').textContent = `${String(now.getDate()).padStart(2,'0')} ${months[now.getMonth()]} ${now.getFullYear()}`;
  let all = [], editId = null, sala = 'vns1';
  onSnapshot(q, (snapshot) => {
    all = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('syncDot').className = 'sync-dot live';
    document.getElementById('syncTxt').textContent = 'Ao vivo · atualizado agora';
    render();
  }, (err) => { document.getElementById('syncTxt').textContent = 'Erro de conexão'; });
  function render() {
    const C = document.getElementById('mainList');
    const v1 = all.filter(s => s.sala==='vns1').sort((a,b) => a.time.localeCompare(b.time));
    const v2 = all.filter(s => s.sala==='vns2').sort((a,b) => a.time.localeCompare(b.time));
    document.getElementById('sT').textContent = all.length;
    document.getElementById('sV1').textContent = v1.length;
    document.getElementById('sV2').textContent = v2.length;
    if (!all.length) { C.innerHTML = `<div class="empty"><div class="ei">🩺</div><p>Nenhuma cirurgia programada.<br>Use os botões acima para adicionar.</p></div>`; return; }
    let h = '';
    if (v1.length) { h += `<div class="sh"><span class="sl-lbl sl1">● VNS 1</span><div class="sbar sb1"></div></div>`; h += v1.map(cardHtml).join(''); }
    if (v2.length) { h += `<div class="sh"><span class="sl-lbl sl2">● VNS 2</span><div class="sbar sb2"></div></div>`; h += v2.map(cardHtml).join(''); }
    C.innerHTML = h;
  }
  function cardHtml(s) {
    const v1 = s.sala==='vns1';
    let sc='',pl='',c1='',c2='',c3='',c4='';
    if (s.status==='confirmed') { sc='scon'; pl=`<span class="pill ${v1?'pc1':'pc2'}">👍🏼 Avaliado</span>`; c1='acon'; }
    else if (s.status==='in-progress') { sc='spro'; pl=`<span class="pill ppr">🔵 Em andamento</span>`; c2='apro'; }
    else if (s.status==='finished') { sc='sfin'; pl=`<span class="pill pfi">✅ Finalizada</span>`; c3='afin'; }
    else if (s.status==='suspended') { sc='ssus'; pl=`<span class="pill psu">❌ Suspensa</span>`; c4='asus'; }
    else { pl=`<span class="pill pp">⏳ Aguardando</span>`; }
    const wa = s.phone ? `<div class="ir" style="grid-column:1/-1"><a class="wbtn" href="${waLink(s)}" target="_blank"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Avisar Anestesista</a></div>` : '';
    return `<div class="card ${v1?'c1':'c2'} ${sc}"><div class="ch"><span class="tb">${s.time}</span><div class="sbg"><button class="sbtn ${c1}" onclick="window.setSt('${s.id}','confirmed')">👍</button><button class="sbtn ${c2}" onclick="window.setSt('${s.id}','in-progress')">🔵</button><button class="sbtn ${c3}" onclick="window.setSt('${s.id}','finished')">✅</button><button class="sbtn ${c4}" onclick="window.setSt('${s.id}','suspended')">❌</button></div></div><div class="cb"><div class="ir snr"><span class="il">Cirurgia</span><span class="iv">${s.name}</span>${pl}</div><div class="ir"><span class="il">Cirurgião</span><span class="iv">${s.surgeon}</span></div><div class="ir"><span class="il">Anestesista</span><span class="iv">${s.anest}</span></div>${wa}<div class="edit-row"><button class="ecb eb" onclick="window.openModal('${s.sala}','${s.id}')">✏️ Editar</button><button class="ecb db" onclick="window.confDel('${s.id}','${s.name}')">🗑️ Excluir</button></div></div></div>`;
  }
  function waLink(s) {
    const m = `Olá Dr(a). ${s.anest}! Você foi escalado(a) para a cirurgia *${s.name}* às *${s.time}* no *${s.sala.toUpperCase()}*. Cirurgião: ${s.surgeon}. Por favor confirme o recebimento. ✅`;
    const p = s.phone.startsWith('55') ? s.phone : '55'+s.phone;
    return `https://wa.me/${p}?text=${encodeURIComponent(m)}`;
  }
  window.setSt = async (id, st) => {
    const s = all.find(x => x.id===id); if (!s) return;
    const newSt = s.status===st ? 'pending' : st;
    await updateDoc(doc(db,'cirurgias',id), { status: newSt });
    const L = { confirmed:'👍🏼 Avaliado!','in-progress':'🔵 Em andamento',finished:'✅ Finalizada!',suspended:'❌ Suspensa',pending:'⏳ Status removido' };
    toast(L[newSt]||'');
  };
  window.confDel = async (id, name) => {
    if (confirm(`Excluir "${name}"?`)) { await deleteDoc(doc(db,'cirurgias',id)); toast('🗑️ Excluída'); }
  };
  window.openModal = (sl, id) => {
    editId=id; sala=sl;
    const ex = id ? all.find(x => x.id===id) : null;
    const isEdit = !!ex;
    document.getElementById('editLblWrap').innerHTML = isEdit ? '<span class="edit-lbl">✏️ Modo Edição</span>' : '';
    document.getElementById('fT').value = ex?ex.time:'';
    document.getElementById('fN').value = ex?ex.name:'';
    document.getElementById('fS').value = ex?ex.surgeon:'';
    document.getElementById('fA').value = ex?ex.anest:'';
    document.getElementById('fP').value = ex?(ex.phone||''):'';
    document.getElementById('mTitle').textContent = isEdit?`Editar — ${sl.toUpperCase()}`:`Nova Cirurgia — ${sl.toUpperCase()}`;
    document.getElementById('mDot').className = `md ${isEdit?'ed':(sl==='vns1'?'v1':'v2')}`;
    const b = document.getElementById('bSav');
    b.className = `bsv ${isEdit?'ed':(sl==='vns1'?'v1':'v2')}`;
    b.textContent = isEdit?'Salvar alterações ✓':'Salvar ✓';
    document.getElementById('sOv').classList.add('open');
    setTimeout(()=>document.getElementById('fT').focus(),300);
  };
  window.closeMod = () => { document.getElementById('sOv').classList.remove('open'); editId=null; };
  window.saveSurg = async () => {
    const t=document.getElementById('fT').value, n=document.getElementById('fN').value.trim(),
          sr=document.getElementById('fS').value.trim(), an=document.getElementById('fA').value.trim(),
          ph=document.getElementById('fP').value.trim().replace(/\D/g,'');
    if (!t||!n||!sr||!an) { toast('⚠️ Preencha todos os campos'); return; }
    if (editId) { await updateDoc(doc(db,'cirurgias',editId),{time:t,name:n,surgeon:sr,anest:an,phone:ph}); toast('✏️ Atualizada!'); }
    else { await addDoc(col,{sala,date:today,time:t,name:n,surgeon:sr,anest:an,phone:ph,status:'pending'}); toast(`✅ Adicionada em ${sala.toUpperCase()}!`); }
    window.closeMod();
  };
  function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
  document.getElementById('sOv').addEventListener('click', e=>{ if(e.target.id==='sOv') window.closeMod(); });
</script>
</body>
</html>
